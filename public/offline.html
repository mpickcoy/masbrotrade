<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0f0d" />
  <title>TradeJournal — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0f0d;
      color: #d1fae5;
      font-family: 'Inter', sans-serif;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #0f1914;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #34d399;
      margin-bottom: 8px;
    }
    h1 { font-size: 22px; font-weight: 600; color: #ecfdf5; }
    p  { font-size: 14px; color: #6ee7b7; line-height: 1.6; max-width: 300px; }
    button {
      margin-top: 8px;
      background: #059669;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { background: #047857; }
  </style>
</head>
<body>
  <div class="logo">TJ</div>
  <h1>Tidak Ada Koneksi</h1>
  <p>TradeJournal membutuhkan internet untuk mengakses data trading Anda. Periksa koneksi lalu coba lagi.</p>
  <button onclick="window.location.reload()">🔄 Coba Lagi</button>
</body>
</html>
